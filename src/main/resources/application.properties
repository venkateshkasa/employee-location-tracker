# Application
spring.application.name=employee-location-tracker
server.port=${PORT:8080}

# Trust Railway's reverse proxy so Spring correctly sees the original scheme (https),
# host and port from X-Forwarded-* headers (needed for secure cookies to work behind the proxy).
server.forward-headers-strategy=native

# MySQL Configuration
# Never hardcode real credentials in this file - Railway injects these as environment
# variables. Do NOT use MYSQL_URL directly as spring.datasource.url: Railway's MYSQL_URL
# value is in the form mysql://user:pass@host:port/db (no "jdbc:" scheme), which the
# MySQL JDBC driver rejects. Building the URL from the individual MYSQLHOST/MYSQLPORT/
# MYSQLDATABASE/MYSQLUSER/MYSQLPASSWORD variables (below) is the correct approach.
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP: fail fast with a clear error instead of hanging/retrying silently, and log
# the exact host Hikari is trying to reach (visible in Railway deploy logs) so a
# connection-refused error can be tied to a specific resolved host:port at boot time.
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Railway serves the app over HTTPS (TLS terminated at the proxy); the cookie should be
# marked secure by default in production. Override with COOKIE_SECURE=false only for
# local plain-HTTP development.
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

# Tracking Configuration
tracking.stop.radius-meters=30
tracking.stop.duration-minutes=15
tracking.online.threshold-minutes=15
tracking.auto-update.interval-minutes=10

# Logging
logging.level.com.employeetracker=INFO
logging.level.org.springframework.security=WARN

# Nearby Place Search Configuration
# Nearby colleges/universities are served from our own MySQL catalog table
# (EducationalInstitutionCatalog) using the Haversine formula - there is no
# external API call, so nearby.search.api.timeout below is unused/kept only
# for backward compatibility with any external tooling that reads it.
# Nearby Place Search Configuration
nearby.search.enabled=true

# Default radius = 3 KM
nearby.search.radius=3000

# Search again only after moving 300 meters
nearby.search.cache.distance=300

# Overpass query timeout = 30 seconds
nearby.search.api.timeout=30000

# HTTP connection timeout = 15 seconds
nearby.search.overpass.connect-timeout-ms=15000

# HTTP read timeout = 30000 ms
nearby.search.overpass.read-timeout-ms=30000

# Geoapify API
geoapify.api.key=dd7b885aaa324186b6fdf89ee6ac60a1