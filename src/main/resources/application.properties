# Application
spring.application.name=employee-location-tracker
server.port=${PORT:8080}

# MySQL Configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Tracking Configuration
tracking.stop.radius-meters=30
tracking.stop.duration-minutes=10
tracking.online.threshold-minutes=15
tracking.auto-update.interval-minutes=10

# Logging
logging.level.com.employeetracker=INFO
logging.level.org.springframework.security=WARN
