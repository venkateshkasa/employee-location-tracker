# Application
spring.application.name=employee-location-tracker
server.port=${PORT:8080}

# Trust Railway's reverse proxy so Spring correctly sees the original scheme (https),
# host and port from X-Forwarded-* headers (needed for secure cookies to work behind the proxy).
server.forward-headers-strategy=native

# MySQL Configuration
# Never hardcode real credentials in this file - Railway injects these as environment
# variables. Set DB_URL / DB_USERNAME / DB_PASSWORD in the Railway service settings
# (or rely on Railway's provided MYSQL* variables and map them to these envs).
# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://hayabusa.proxy.rlwy.net:36690/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:JNIvTGJJETfwjLVHKkvNfkhdyqrRdxsN}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Railway serves the app over HTTPS (TLS terminated at the proxy); the cookie should be
# marked secure by default in production. Override with COOKIE_SECURE=false only for
# local plain-HTTP development.
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

# Tracking Configuration
tracking.stop.radius-meters=30
tracking.stop.duration-minutes=10
tracking.online.threshold-minutes=15
tracking.auto-update.interval-minutes=10

# Logging
logging.level.com.employeetracker=INFO
logging.level.org.springframework.security=WARN