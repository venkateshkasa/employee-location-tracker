# Application
spring.application.name=employee-location-tracker
server.port=${PORT:8080}

# Trust Railway's reverse proxy so Spring correctly sees the original scheme (https),
# host and port from X-Forwarded-* headers (needed for secure cookies to work behind the proxy).
server.forward-headers-strategy=native

# MySQL Configuration
# Never hardcode real credentials in this file - Railway injects these as environment
# variables. Do NOT use MYSQL_URL directly as spring.datasource.url: Railway's MYSQL_URL
# value is in the form mysql://user:pass@host:port/db (no "jdbc:" scheme), which the
# MySQL JDBC driver rejects. Building the URL from the individual MYSQLHOST/MYSQLPORT/
# MYSQLDATABASE/MYSQLUSER/MYSQLPASSWORD variables (below) is the correct approach.
# Local MySQL Configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# HikariCP: fail fast with a clear error instead of hanging/retrying silently, and log
# the exact host Hikari is trying to reach (visible in Railway deploy logs) so a
# connection-refused error can be tied to a specific resolved host:port at boot time.
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Railway serves the app over HTTPS (TLS terminated at the proxy); the cookie should be
# marked secure by default in production. Override with COOKIE_SECURE=false only for
# local plain-HTTP development.
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

# Tracking Configuration
tracking.stop.radius-meters=30
tracking.stop.duration-minutes=15
tracking.online.threshold-minutes=15
tracking.auto-update.interval-minutes=10

# Logging
logging.level.com.employeetracker=INFO
logging.level.org.springframework.security=WARN

# Nearby Place Search Configuration
# Nearby colleges/universities are served from our own MySQL catalog table
# (EducationalInstitutionCatalog) using the Haversine formula - there is no
# external API call, so nearby.search.api.timeout below is unused/kept only
# for backward compatibility with any external tooling that reads it.
# Nearby Place Search Configuration
nearby.search.enabled=true

# Default radius = 3 KM
nearby.search.radius=3000

# Search again only after moving 300 meters
nearby.search.cache.distance=300

# Overpass query timeout = 30 seconds
nearby.search.api.timeout=30000

# HTTP connection timeout = 15 seconds
nearby.search.overpass.connect-timeout-ms=15000

# HTTP read timeout = 30000 ms
nearby.search.overpass.read-timeout-ms=30000

# Geoapify API
geoapify.api.key=dd7b885aaa324186b6fdf89ee6ac60a1
# ---- Employee Profile Photo Upload ----
# Uploaded profile photos are decoded from the Base64 payload sent by the
# Add/Edit Employee form and written to disk here (relative to the app's
# working directory unless an absolute path is given). Only the resulting
# relative URL (e.g. /uploads/profile-photos/<uuid>.png) is stored in the
# Users.PhotoUrl column - never the raw Base64 data - which is what was
# overflowing the VARCHAR(500) column before this fix.
app.upload.root-dir=${UPLOAD_DIR:uploads}
app.upload.profile-photo-subdir=profile-photos
# 2 MB
app.upload.max-photo-size-bytes=2097152
app.upload.allowed-photo-types=image/jpeg,image/png,image/gif,image/webp

# ---- Mail (Welcome email on employee creation) ----
# For local development with Gmail SMTP: MAIL_USERNAME is the full Gmail
# address and MAIL_PASSWORD is a 16-character Google Account "App Password"
# (Google Account > Security > 2-Step Verification > App passwords) - a
# normal Gmail login password will NOT work here.
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

spring.mail.properties.mail.debug=${MAIL_DEBUG:true}
# From address used on outgoing welcome emails; falls back to the SMTP username.
app.mail.from=${MAIL_FROM:${MAIL_USERNAME}}
# ---- Public base URL used to build absolute links in outgoing emails ----
# (e.g. the "Create Password" link in the welcome email). Override with the
# APP_BASE_URL environment variable when running behind ngrok or any other
# public URL, e.g. APP_BASE_URL=https://<your-subdomain>.ngrok-free.app
app.base-url=${APP_BASE_URL}